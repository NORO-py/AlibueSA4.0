<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#1f3a2e" />
  <title>ALIBUE — Gestión Avícola</title>
  <meta name="description" content="Sistema profesional de gestión de producción avícola para ALIBUE." />
  <link rel="stylesheet" href="./main.css" />
  <link rel="stylesheet" href="./dashboard.css" />
  <link rel="stylesheet" href="./forms.css" />
  <link rel="stylesheet" href="./responsive.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- Firebase (sincronización en la nube entre dispositivos) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <img src="./logo.png" alt="Alibue" class="brand-logo" />
    </div>
    <div class="header-meta">
      <span id="header-user" class="user-badge"></span>
      <button id="logout-btn" class="ghost-btn" hidden>Salir</button>
    </div>
  </header>

  <main id="app-root" class="app-root"></main>

  <footer class="app-footer">
    <small>Creado por Aparicio Agustín</small>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="modal-root"></div>

  <script src="./utils.js"></script>
  <script src="./firebase-config.js"></script>
  <script src="./database.js"></script>
  <script src="./auth.js"></script>
  <script src="./alerts.js"></script>
  <script src="./statistics.js"></script>
  <script src="./reports.js"></script>
  <script src="./tasks.js"></script>
  <script src="./cloud.js"></script>
  <script src="./app.js"></script>
</body>
</html>
